<!DOCTYPE html>
<html>
<head>
  <title>AI Legal Assistant</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a33;
      color: white;
      display: flex;
    }

    .left {
      width: 300px;
      padding: 20px;
      background: #1e2b44;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #2ecc71;
      border: none;
      color: white;
      cursor: pointer;
    }

    .chat {
      flex: 1;
      padding: 20px;
    }

    .msg {
      background: #2c3e50;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="left">
  <h2>⚖️ Legal AI</h2>

  <textarea placeholder="Describe your problem..."></textarea>

  <button onclick="analyze()">Analyze</button>
  <button onclick="startVoice()">🎤 Speak</button>
  <button onclick="downloadPDF()">📄 Download Notice</button>
</div>

<div class="chat" id="chat"></div>

<script src="script.js"></script>

</body>
</html>
